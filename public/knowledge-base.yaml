bookingProcess:
  - step: 1
    action: Beskriv ditt projekt
    details: På fixco.se eller ring +46 79 335 02 28
  - step: 2
    action: Få offert
    details: Inom 24-48 timmar. Gratis hembesök för större projekt
  - step: 3
