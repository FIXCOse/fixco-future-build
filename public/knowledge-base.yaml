faq:
  - question: Hur bokar jag en hantverkare?
    answer: Beskriv ditt projekt på fixco.se eller ring +46 79 335 02 28. Du får offert inom 24-48 timmar.
  
  - question: Vad kostar era tjänster?
    answer: Kontakta oss för prisuppgift — alltid konkurrenskraftigt med ROT/RUT-avdrag. Ring +46 79 335 02 28.
  
  - question: Hur fungerar ROT-avdraget?
    answer: Vi drar av 30% av arbetskostnaden direkt på fakturan. Du behöver bara betala resterande arbetskostnad plus material.

  - question: Hur fungerar RUT-avdraget?
    answer: Vi drar av 50% av arbetskostnaden direkt på fakturan för städning, trädgård, flytt och montering.

